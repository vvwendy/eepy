The history of tea \u2014 from Tang dynasty China to London","Daily life inside a medieval monastery","Why Roman roads still exist two thousand years later","The great libraries of the ancient world","How lighthouses worked before electricity","The slowest luxuries of the Silk Road","How cathedrals were built across whole centuries","The history of timekeeping, from sundials to clock towers","Star maps and constellations across different cultures","The quiet history of gardens, from Persia to Kyoto","How Venice was built on water"],Sg=[{name:"The Fool",text:"What would tomorrow look like if you began it lightly, without the whole story?"},{name:"The Magician",text:"You already had every tool you needed today. Set them down for the night."},{name:"The High Priestess",text:"Something in you already knows. Let sleep do the listening."},{name:"The Empress",text:"Tend to yourself the way you'd tend a garden \u2014 gently, and then rest."},{name:"The Emperor",text:"Structure held you today. Now let it hold itself until morning."},{name:"The Hierophant",text:"What ritual is quietly working for you? Honor it tonight."},{name:"The Lovers",text:"What did you choose today that you'd gladly choose again?"},{name:"The Chariot",text:"You steered all day. Take your hands off the reins."},{name:"Strength",text:"Soft strength counts too. Where were you gentle when you could have been hard?"},{name:"The Hermit",text:"The quiet you're stepping into isn't loneliness \u2014 it's your lantern."},{name:"Wheel of Fortune",text:"Some of today was luck, good and bad. Neither needs solving tonight."},{name:"Justice",text:"The scales can hold themselves overnight. Weigh things again in daylight."},{name:"The Hanged Man",text:"Seen from another angle, what looked stuck today might just be pausing."},{name:"Death",text:"Something ended today, even something small. Let it end."},{name:"Temperance",text:"Not too much, not too little. What did balance feel like today?"},{name:"The Devil",text:"What kept you tethered tonight \u2014 a screen, a worry? Name it, then set it down."},{name:"The Tower",text:"If something cracked today, remember: cleared ground is buildable ground."},{name:"The Star",text:"Hope is a slow, quiet light. Let one hopeful thought be your last tonight."},{name:"The Moon",text:"Not everything needs to be clear before you rest. The moon never explains."},{name:"The Sun",text:"Find the warmest moment of today and fall asleep inside it."},{name:"Judgement",text:"You don't have to be the judge tonight. Court is adjourned."},{name:"The World",text:"Something in your life just completed a circle. Notice it."}],Cg=[{name:"Root",sanskrit:"Muladhara",color:"#A6402F",practice:"Lie flat and let the mattress hold your full weight. You are supported \u2014 nothing to grip."},{name:"Sacral",sanskrit:"Svadhisthana",color:"#D97B33",practice:"Rest warm palms on your lower belly and breathe into them. Slow circles if it feels good."},{name:"Solar Plexus",sanskrit:"Manipura",color:"#D9B23A",practice:"Unclench the day's effort \u2014 soften your stomach on each exhale, three slow times."},{name:"Heart",sanskrit:"Anahata",color:"#7FA65A",practice:"One hand on your heart. Name one thing you're grateful for, and one person."},{name:"Throat",sanskrit:"Vishuddha",color:"#6E8FA6",practice:"Hum softly on your exhale for a minute \u2014 the vibration itself is the wind-down."},{name:"Third Eye",sanskrit:"Ajna",color:"#6F5E8C",practice:"Close your eyes and rest attention between your brows. Nothing to see \u2014 just settle there."},{name:"Crown",sanskrit:"Sahasrara",color:"#9B7FA6",practice:"Imagine the day lifting off the top of your head like steam. Let your mind empty upward."}],yg=[{id:"twosleeps",title:"The two sleeps",origin:"Medieval Europe",desc:"Before electric light, many people slept in two shifts with a calm hour awake between them. If you wake at 3am, don\u2019t fight it \u2014 sit up, do something quiet and dim, and return when heavy."},{id:"ofuro",title:"Ofuro \u2014 the deep hot bath",origin:"Japan",desc:"A hot soak 60\u201390 minutes before bed. The body-temperature drop afterwards is what triggers drowsiness \u2014 your candlelit shower works the same lever."},{id:"nidra",title:"Yoga nidra",origin:"India",desc:"\u201CThe sleep of the yogis\u201D \u2014 a lying-down guided body scan. Calm and Headspace both carry versions; it\u2019s one of the best-studied wind-downs there is."},{id:"moonmilk",title:"Warm spiced milk",origin:"Ayurveda, India",desc:"Warm milk with nutmeg or cardamom before bed \u2014 the ancestor of the modern \u201Cmoon milk.\u201D Ritual plus warmth plus a little tryptophan."},{id:"footsoak",title:"The evening foot soak",origin:"China",desc:"Warm water to the ankles for 10\u201315 minutes. Traditional medicine says it draws heat downward; modern take: it\u2019s deeply relaxing and warms the extremities, which helps sleep onset."},{id:"chamomile",title:"Chamomile",origin:"Ancient Egypt + Greece",desc:"One of the oldest recorded sleep remedies on Earth. If tea is in your routine, you\u2019re continuing a very long tradition."},{id:"valerian",title:"Valerian root",origin:"Ancient Greece + Rome",desc:"Galen prescribed it for insomnia nearly two thousand years ago. Your supplement has one of the longest track records in history."},{id:"lavender",title:"Lavender under the pillow",origin:"Provence, France",desc:"Dried lavender sachets tucked into bedding. Scent is a powerful sleep cue because it bypasses the thinking brain entirely."},{id:"duvets",title:"Two duvets, one bed",origin:"Scandinavia",desc:"Each sleeper gets their own duvet \u2014 no tug-of-war, fewer micro-wakings. Widely credited for calmer couple sleep."},{id:"hammock",title:"Rocked to sleep",origin:"Yucat\xE1n, Mexico",desc:"Generations have slept in hammocks \u2014 and studies show gentle rocking genuinely deepens sleep. A slow rocking chair during wind-down borrows the effect."},{id:"porch",title:"The sleeping porch",origin:"Early 1900s America",desc:"Whole families slept on screened porches for cold, fresh air. The modern translation: crack a window, drop the thermostat, sleep cooler."},{id:"weighted",title:"Deep pressure",origin:"Nordic care tradition",desc:"Weighted blankets came out of Scandinavian occupational therapy \u2014 steady, even pressure reads as safety to the nervous system."},{id:"zen",title:"Count exhales, not sheep",origin:"Zen Buddhism",desc:"Count each exhale, one to ten, then start over. Lose count? Just begin again \u2014 losing count is the practice working."},{id:"siesta",title:"Respect the afternoon dip",origin:"Spain + Mexico",desc:"Cultures with siestas work with the body\u2019s natural mid-afternoon lull. If you nap: short (20 min) and early, so it doesn\u2019t steal from the night."},{id:"compline",title:"Compline + the Great Silence",origin:"Benedictine monasteries",desc:"Monks end each day with one final prayer, then keep complete silence until morning \u2014 and have for 1,500 years. The borrowable part: pick a \u201Clast word\u201D time after which there\u2019s no talking, no scrolling, just quiet."},{id:"shema",title:"The bedtime Shema",origin:"Jewish tradition",desc:"Recited in bed, and it begins with forgiving anyone who wronged you that day \u2014 so you never carry a grudge into sleep. Try releasing the day\u2019s frictions as your closing line."},{id:"metta",title:"Loving-kindness (metta)",origin:"Buddhist tradition",desc:"Silently wish well: first to yourself, then someone dear, someone neutral, someone difficult. A classic drift-off practice \u2014 the mind can\u2019t hold resentment and this at the same time."},{id:"lion",title:"The sleeping lion posture",origin:"Buddhist monasteries",desc:"The Buddha slept on his right side, hand under his cheek, legs gently stacked \u2014 still taught in monasteries today as the posture of restful ease. Worth a try if you toss."},{id:"review",title:"The evening review",origin:"Seneca, Rome + Ignatius, Spain",desc:"Both the Stoics and the Jesuits ended the day the same way: What did I do well? Where did I slip? What remains for tomorrow? Then \u2014 crucially \u2014 close the books. The review has an ending."},{id:"dhikr",title:"Dhikr \u2014 quiet remembrance",origin:"Islamic tradition",desc:"A soft, rhythmic repetition of short phrases before sleep, often counted on the fingers, after the evening ablution \u2014 the washing itself marks the transition out of the day. Rhythm, repetition, ritual water: three sleep levers in one tradition."},{id:"beads",title:"Beads in every tradition",origin:"Mala, rosary, komboskini, misbaha",desc:"Nearly every culture independently invented prayer beads: a repeated phrase plus something for the hands to do occupies the restless mind completely. Any calm phrase counted on beads or fingers works."},{id:"abhyanga",title:"Abhyanga \u2014 warm oil massage",origin:"Ayurveda, India",desc:"Self-massage with warm oil before an evening bath. Slow strokes, feet especially. One of the oldest \u201Ctransition out of the day\u201D rituals on record."},{id:"shabbat",title:"The weekly full stop",origin:"Shabbat, Jewish tradition",desc:"One evening a week: candles lit, work closed, screens down \u2014 a hard boundary the whole nervous system learns to expect. Even a secular version (one protected evening) can reset a whole week of sleep."}],ei=["untried","try","worked","nope"],Ig={untried:"Untried",try:"Want to try",worked:"Worked for me",nope:"Not for me"},mf=[{id:"478",name:"4\u20137\u20138",origin:"Pranayama roots \xB7 popularized by Dr. Weil",steps:[{name:"Inhale",secs:4,scale:1},{name:"Hold",secs:7,scale:1},{name:"Exhale",secs:8,scale:.55}],note:"The classic pre-sleep pattern. The long exhale is the sedative part."},{id:"box",name:"Box breathing",origin:"Used by militaries + meditators alike",steps:[{name:"Inhale",secs:4,scale:1},{name:"Hold",secs:4,scale:1},{name:"Exhale",secs:4,scale:.55},{name:"Hold",secs:4,scale:.55}],note:"Even and steadying \u2014 good when your mind is racing."},{id:"ext",name:"Long exhale",origin:"The simplest sleep breath",steps:[{name:"Inhale",secs:4,scale:1},{name:"Exhale",secs:6,scale:.55}],note:"Exhaling longer than you inhale nudges the nervous system toward rest."},{id:"coherent",name:"Coherent breathing",origin:"~6 breaths per minute",steps:[{name:"Inhale",secs:5,scale:1},{name:"Exhale",secs:5,scale:.55}],note:"Slow, even, and easy to sustain for 5\u201310 minutes."}],ku=e=>e[Math.floor(Math.random()*e.length)],up=()=>new Date().toDateString(),ai={signal:[],body:[],mind:[],settle:[]};function vg(e){let a=e||ai,t={};return Object.keys(tp).forEach(l=>{t[l]=[...tp[l],...a[l]||[]]}),t}function op(e,a,t=[],l=!1){let u=e[a].filter(f=>!t.includes(f.id));if(l){let f=u.filter(d=>d.gentle);f.length&&(u=f)}u.length||(u=e[a]);let o=ku(u);return{phase:a,...o,done:!1}}function bg(e,a){let t=a==="gentle",l=t?["signal",Math.random()<.5?"body":"mind","settle"]:["signal","body","mind","settle"];return{date:up(),ts:Date.now(),energy:a,prompt:ku(gg),topic:ku(xg),tarot:ku(Sg),chakra:ku(Cg),items:l.map(u=>op(e,u,[],t))}}function Ag(e){let[a,t]=e.split(":").map(Number);return a*60+t}function lp(e){e=(e%1440+1440)%1440;let a=Math.floor(e/60),t=e%60,l=a>=12?"PM":"AM";return a=a%12||12,`${a}:${String(t).padStart(2,"0")} ${l}`}var ge=({children:e,style:a})=>r.default.createElement("div",{style:{background:y.surface,border:`1px solid ${y.line}`,borderRadius:16,padding:16,...a}},e),bt=({children:e})=>r.default.createElement("div",{style:{fontSize:11,letterSpacing:2.5,textTransform:"uppercase",color:y.faint,fontWeight:700,margin:"4px 0 10px"}},e),oa=({active:e,onClick:a,children:t})=>r.default.createElement("button",{onClick:a,style:{background:e?y.ember:"transparent",color:e?"#20130B":y.dim,border:`1px solid ${e?y.ember:y.line}`,borderRadius:999,padding:"7px 14px",fontSize:13,fontWeight:600,fontFamily:"inherit",cursor:"pointer"}},t);function ti(){let[e,a]=(0,r.useState)("tonight"),[t,l]=(0,r.useState)(!1),[u,o]=(0,
